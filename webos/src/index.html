<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>xCloud Pure</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #050505;
        color: #fff;
        font-family: sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      main {
        width: 86%;
        max-width: 900px;
      }
      h1 {
        font-size: 40px;
        margin: 0 0 18px;
      }
      p {
        font-size: 22px;
        opacity: .8;
        margin: 0 0 24px;
      }
      input, button {
        box-sizing: border-box;
        width: 100%;
        font-size: 26px;
        border-radius: 12px;
        border: 0;
        padding: 18px 22px;
        margin: 8px 0;
      }
      input {
        background: #1b1b1b;
        color: #fff;
        outline: 2px solid #333;
      }
      button {
        background: #107c10;
        color: #fff;
        font-weight: bold;
      }
      .secondary {
        background: #242424;
      }
    </style>
    <script src="index.js"></script>
  </head>
  <body>
    <main>
      <h1>xCloud Pure</h1>
      <p>Digite uma URL ou use um dos atalhos.</p>
      <input id="url" value="https://www.xbox.com/pt-BR/play" autocomplete="off" autocapitalize="off" spellcheck="false">
      <button id="open">Abrir URL</button>
      <button id="xcloud" class="secondary">Abrir xCloud</button>
      <button id="login" class="secondary">Entrar na conta</button>
    </main>
  </body>
</html>
